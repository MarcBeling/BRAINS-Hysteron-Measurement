name: "IV_DNPU_Voltage_Measurement"
description: "Run with a DNPU and with no control voltages and larger voltage range to check for offsets in the device."

min_value: -1.5
max_value: 1.5
data_density: 40
voltage_range: [-2.0, 2.0]
current_range: [-0.2e-6, 0.2e-6]
amplification: 1
ramp_points: 1000

nidaq:
  activation_module_id: 'cDAQ1Mod1'
  readout_module_id: 'cDAQ1Mod2'
  sample_frequency: 10000.0
  update_frequency: 1000.0
  samples_per_measurement: 5
  readout_channels: [1] # 0-7
  control_voltages:
    15: 0
    10: 0
    9: 0
    8: -0
    12: -0
    13: -0
    14: -0


smu:
  device_id: 'GPIB0::15::INSTR'
  timeout: 50000
  drive_mode: 'VOLTAGE_DRIVEN'
  tolerance_voltage: 0.01
  tolerance_current: 10e-9
  pause_between_set: 0.02