name: "VI_RNPU_3T_FLOAt"
description: "IV Measurement but with Current measurement using the SMU. This data is saved as voltage_SMU_ei.csv. -0mV Control Voltage. Physically onnected pads: 2, 3, III"
min_value: -200e-9
max_value: 200e-9
data_density: 60
voltage_range: [-2.0, 2.0]
current_range: [-500e-9, 500e-9]
amplification: 1
waveform: 'REZA'

nidaq:
  activation_module_id: 'cDAQ1Mod1'
  readout_module_id: 'cDAQ1Mod2'
  sample_frequency: 4000.0
  update_frequency: 1000.0
  ramp_points: 3000
  samples_per_measurement: 5
  readout_channels: [2, 3] # 0-7
  control_voltages:
    3: 0

smu:
  device_id: 'GPIB15::15::INSTR'
  timeout: 50000
  drive_mode: 'CURRENT_DRIVEN'
  tolerance_voltage: 0.01
  tolerance_current: 10e-9
  pause_between_set: 0.02