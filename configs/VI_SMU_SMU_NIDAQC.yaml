name: "VI_SMU_SMU_NIDAQC_NRNPU"
description: "VI Measurement with two SMUs and a NIDAQ module responsible for setting a voltage control. Pads connected: IV Input, II Output, 4 Control. "
min_value: 50e-9
max_value: -50e-9
data_density: 120
voltage_range: [-2.0, 2.0]
current_range: [-500e-9, 500e-9]
amplification: 1
waveform: 'REZA'

nidaq:
  activation_module_id: 'cDAQ1Mod1'
  readout_module_id: 'cDAQ1Mod2'
  sample_frequency: 4000.0
  update_frequency: 1000.0
  ramp_points: 3000
  samples_per_measurement: 5
  readout_channels: [6] # 0-7
  control_voltages:
    6: 0

smu_1:
  device_id: 'GPIB15::15::INSTR'
  timeout: 50000
  drive_mode: 'VOLTAGE_DRIVEN'
  tolerance_voltage: 0.01
  tolerance_current: 10e-9
  pause_between_set: 0.02

smu_2:
  device_id: 'GPIB1::15::INSTR'
  timeout: 50000
  drive_mode: 'CURRENT_DRIVEN'
  tolerance_voltage: 0.01
  tolerance_current: 10e-9
  pause_between_set: 0.02