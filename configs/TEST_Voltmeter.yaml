name: "TEST_VOLTMETER"
description: "Tests to see if communication to the voltmeter works."
min_value: -2.0
max_value: 2.0
data_density: 20
voltage_range: [-2.0, 2.0]
current_range: [-500e-9, 500e-9]
amplification: 1
waveform: 'REZA'

nidaq:
  activation_module_id: 'cDAQ1Mod1'
  readout_module_id: 'cDAQ1Mod2'
  sample_frequency: 4000.0
  update_frequency: 1000.0
  ramp_points: 3000
  samples_per_measurement: 5
  readout_channels: [0]
  control_voltages:
    7: 0

voltmeter:
  device_id: 'GPIB0::17::INSTR'
  timeout: 50000
  measurement_mode: 'voltage'
  range: 10
  trigger_count: 1
  nplc: 1