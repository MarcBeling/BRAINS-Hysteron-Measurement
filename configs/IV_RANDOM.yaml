name: "IV_RNPU_RANDOM_CV"
description: "Randomized Control Voltages to get NDR at input"
device_measured: "RNPU"
min_value: -1.5
max_value: 1.5
data_density: 120
voltage_range: [-2, 2]
current_range: [-600e-9, 600e-9]
amplification: 1
wavetype: 'SWEEP'
input_pad: 7
readout_pad: "IV"
num_of_randoms: 20

nidaq:
  activation_module_id: 'cDAQ1Mod1'
  readout_module_id: 'cDAQ1Mod2'
  sample_frequency: 10000.0
  update_frequency: 5000.0
  ramp_points: 1000
  samples_per_measurement: 5
  readout_channels: []
  control_voltages:
    0: 0
    1: 0
    2: 0
    4: 0
    5: 0
    6: 0
    7: 0

K2400:
  device_id: 'GPIB16::15::INSTR'
  timeout: 50000
  drive_mode: 'VOLTAGE_DRIVEN'
  tolerance_voltage: 0.01
  tolerance_current: 1e-9
  pause_between_set: 0.00
  nplc_current: 0.01
  nplc_voltage: 1
  average_over: 1